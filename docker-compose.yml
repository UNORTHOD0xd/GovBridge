services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: govbridge
      POSTGRES_USER: govbridge_admin
      POSTGRES_PASSWORD: hackathon2026
      TZ: America/Jamaica
      PGTZ: America/Jamaica
    ports: ["5433:5432"]
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports: ["29092:29092"]

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_NAME: govbridge
      DB_USERNAME: govbridge_admin
      DB_PASSWORD: hackathon2026
      KAFKA_BROKERS: kafka:9092
      CHAIN_RPC_URL: https://sepolia.base.org
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY}
      DOC_VERIFY_ADDRESS: ${DOC_VERIFY_ADDRESS}
      PAYMENT_RECEIPT_ADDRESS: ${PAYMENT_RECEIPT_ADDRESS}
    ports: ["8080:8080"]
    depends_on: [postgres, kafka]

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
