server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:govbridge}
    username: ${DB_USERNAME:govbridge_admin}
    password: ${DB_PASSWORD:hackathon2026}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
    consumer:
      group-id: govbridge
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

govbridge:
  chain:
    rpc-url: ${CHAIN_RPC_URL:https://sepolia.base.org}
    private-key: ${DEPLOYER_PRIVATE_KEY:}
    doc-verify-address: ${DOC_VERIFY_ADDRESS:}
    payment-receipt-address: ${PAYMENT_RECEIPT_ADDRESS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
