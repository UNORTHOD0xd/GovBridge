apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: govbridge-ingress
  namespace: govbridge
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "govbridge-backend"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: govbridge-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: govbridge-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: govbridge-frontend
                port:
                  number: 80
